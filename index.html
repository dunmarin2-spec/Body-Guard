<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>바디 가드 (Body Guard) - 찬둥 공식 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Nanum+Pen+Script&family=Staatliches&display=swap');
        
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        /* 찬둥의 필기체 시그니처 (B타입) */
        .chan-doong-signature { font-family: 'Nanum Pen Script', cursive; font-size: 22px; color: #38bdf8; transform: rotate(-10deg); margin-bottom: -10px; margin-left: -10px; z-index: 50; }

        .body-card { width: 100%; max-width: 380px; aspect-ratio: 9 / 16; background: #1e293b; padding: 20px; border: 2px solid #334155; display: flex; flex-direction: column; margin: 0 auto; border-radius: 30px; position: relative; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        
        .photo-box { width: 100%; flex-grow: 1; border-radius: 20px; overflow: hidden; background: #0f172a; border: 2px dashed #475569; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #viewImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .input-text { color: #fff; font-weight: 700; outline: none; border: none; background: transparent; padding: 0;}
        .rendering .input-text { display: none !important; }
        .fixed-text { display: none; color: #fff; font-weight: 700; word-break: break-all; white-space: pre-wrap; }
        .rendering .fixed-text { display: block !important; }

        /* 오운완 스탬프 */
        .ounwan-stamp { font-family: 'Staatliches', cursive; font-size: 4rem; color: #38bdf8; opacity: 0.3; transform: rotate(-20deg); position: absolute; top: 40%; left: 10%; z-index: 5; pointer-events: none; }
        .rendering .ounwan-stamp { opacity: 0.5; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md mx-auto min-h-screen">
        <header class="text-center mb-8 flex flex-col items-center">
            <span class="chan-doong-signature">찬둥의</span>
            <h1 class="text-3xl font-black text-white italic tracking-tighter" style="font-family: 'Staatliches', cursive; letter-spacing: 1px;">BODY GUARD</h1>
            <p class="text-xs text-sky-400 mt-1 font-bold uppercase">No Pain, No Gain</p>
        </header>

        <section id="captureArea" class="body-card">
            <div class="ounwan-stamp">O.U.W</div>
            <div class="flex justify-between items-center mb-4 border-b border-sky-900/30 pb-3 z-10">
                <div class="flex flex-col relative">
                    <span class="chan-doong-signature text-sm">찬둥의</span>
                    <p id="cardDate" class="text-[10px] text-sky-500 font-bold mb-0.5"></p>
                    <input type="text" id="gymName" placeholder="장소(GYM)" class="input-text text-lg italic w-40">
                    <div id="gymName_fixed" class="fixed-text text-lg italic w-40"></div>
                </div>
                <div class="text-right flex items-center gap-2">
                    <i data-lucide="dumbbell" class="w-6 h-6 text-sky-500"></i>
                    <div class="flex flex-col">
                        <input type="text" id="workoutPart" placeholder="운동 부위" class="input-text text-sm w-20 text-right">
                        <div id="workoutPart_fixed" class="fixed-text text-sm w-20 text-right"></div>
                    </div>
                </div>
            </div>
            
            <div class="photo-box" onclick="document.getElementById('fileInput').click()">
                <div id="uploadGuide" class="text-sky-800 flex flex-col items-center">
                    <i data-lucide="user" class="w-12 h-12 mb-2"></i>
                    <p class="text-[11px] font-bold">바디체크 사진 등록</p>
                </div>
                <img id="viewImg" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="loadFile(event)">
            </div>

            <div class="grid grid-cols-2 gap-3 mt-2 z-10">
                <div class="bg-[#0f172a] p-4 rounded-2xl border border-sky-900/20">
                    <p class="text-[9px] text-sky-500 font-bold uppercase mb-1 flex items-center gap-1">
                        <i data-lucide="timer" class="w-2.5 h-2.5"></i> Time
                    </p>
                    <input type="text" id="duration" placeholder="90분" class="input-text text-xs w-full">
                    <div id="duration_fixed" class="fixed-text text-xs w-full"></div>
                </div>
                <div class="bg-[#0f172a] p-4 rounded-2xl border border-sky-900/20">
                    <p class="text-[9px] text-sky-500 font-bold uppercase mb-1 flex items-center gap-1">
                        <i data-lucide="award" class="w-2.5 h-2.5"></i> Volume
                    </p>
                    <input type="text" id="volume" placeholder="5,000kg" class="input-text text-xs w-full">
                    <div id="volume_fixed" class="fixed-text text-xs w-full"></div>
                </div>
            </div>
            <p class="text-[7px] text-center text-sky-900/50 mt-5 italic tracking-widest uppercase z-10">Today's Workout Complete</p>
        </section>

        <button onclick="saveAndExport()" class="w-full bg-sky-600 text-white font-black p-5 rounded-3xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition text-lg mt-8 mb-6">
            <i data-lucide="flame" class="w-6 h-6"></i> 땀의 결실 갤러리에 저장
        </button>

        <div class="flex flex-col gap-3">
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-2 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-bold text-sm shadow">☕ 찬둥에게 커피 후원하기</a>
            
            <div class="bg-[#1e293b] border border-sky-900/20 rounded-2xl p-5 shadow-sm">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="단백질/보충제 최저가 검색" class="flex-grow p-3 border border-sky-900/30 rounded-xl text-sm bg-[#0f172a] outline-none text-white">
                    <button type="submit" class="bg-sky-600 text-white px-5 rounded-xl font-bold text-xs active:scale-95 transition">검색</button>
                </form>
                <p class="text-[9px] text-slate-500 mt-3 text-center italic">"이 포스팅은 쿠팡 파트너스 활동의 일환으로 수수료를 제공받습니다."</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('cardDate').innerText = new Date().toLocaleDateString('ko-KR', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'});
        let currentUrl = null;
        function loadFile(e) {
            const file = e.target.files[0]; if(!file) return;
            const imgEl = document.getElementById('viewImg');
            const uploadGuide = document.getElementById('uploadGuide');
            if (currentUrl) URL.revokeObjectURL(currentUrl);
            currentUrl = URL.createObjectURL(file);
            imgEl.src = currentUrl;
            imgEl.onload = function() { imgEl.classList.remove('hidden'); uploadGuide.style.display = 'none'; };
            e.target.value = "";
        }
        async function saveAndExport() {
            const part = document.getElementById('workoutPart');
            const imgEl = document.getElementById('viewImg');
            if(!part.value || imgEl.classList.contains('hidden')) return alert('형님, 운동 부위랑 사진은 필수입니다!');
            const area = document.getElementById('captureArea');
            document.getElementById('gymName_fixed').innerText = document.getElementById('gymName').value || ' ';
            document.getElementById('workoutPart_fixed').innerText = part.value;
            document.getElementById('duration_fixed').innerText = document.getElementById('duration').value || ' ';
            document.getElementById('volume_fixed').innerText = document.getElementById('volume').value || ' ';
            area.classList.add('rendering');
            window.scrollTo(0, 0); 
            const canvas = await html2canvas(area, { scale: 2.5, backgroundColor: '#0f172a', useCORS: true });
            area.classList.remove('rendering');
            const link = document.createElement('a');
            link.download = `BodyGuard_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png'); link.click();
            alert('형님! 기가 막힌 몸짱 인증샷 저장됐습니다! 💪🔥');
            if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
            [document.getElementById('gymName'), part, document.getElementById('duration'), document.getElementById('volume')].forEach(i => i.value = '');
            imgEl.src = ''; imgEl.classList.add('hidden'); document.getElementById('uploadGuide').style.display = 'flex';
        }
    </script>
</body>
</html>
